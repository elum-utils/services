name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Go checks and tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: RBTX0DXKbagvCy2XCAi4qHt0cjeSD6bU
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run static checks
        run: go vet ./...

      - name: Build packages
        run: go build ./...

      - name: Run tests
        run: go test -count=1 ./...
